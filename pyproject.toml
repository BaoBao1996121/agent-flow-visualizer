[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [".anthill-data", ".venv", "build", "dist"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "B"]
ignore = ["B008"] # FastAPI Query/Depends are intentional call defaults.

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
