name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  exploration-fast:
    name: Exploration fast gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install focused validation dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Check Python and staged-validation contracts
        run: |
          ruff check --no-cache .
          python -m pytest -q \
            tests/test_version_contract.py \
            tests/test_frontend_contract.py \
            tests/test_visual_fixtures.py \
            tests/test_visual_baseline_contract.py \
            tests/test_ci_staging_contract.py
      - name: Check primary frontend modules
        run: |
          node --check static/js/anthill.js
          node --check static/js/app.js
          node --check static/js/graph.js
          node --check static/js/simulation.js

  python:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check --no-cache .
      - run: python -m pytest -q

  langgraph-compat:
    name: LangGraph StreamPart v2 (${{ matrix.label }})
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "1.1.0 floor"
            requirement: "langgraph==1.1.0"
          - label: "supported 1.x"
            requirement: "langgraph>=1.2,<2"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install core tests and optional LangGraph runtime
        run: python -m pip install -r requirements-dev.txt "${{ matrix.requirement }}"
      - name: Show resolved LangGraph version
        run: python -c "from importlib.metadata import version; print(version('langgraph'))"
      - name: Exercise real StreamPart v2 boundary and canonical mapper
        run: >-
          python -m pytest -q
          tests/test_langgraph_runtime_compat.py
          tests/test_langgraph_adapter.py

  frontend:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: node --check static/js/anthill.js
      - run: node --check static/js/app.js
      - run: node --check static/js/graph.js
      - run: node --check static/js/simulation.js

  browser:
    name: Chromium observatory contract
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Install frontend test dependencies
        run: npm ci
      - name: Install Chromium and Linux dependencies
        run: npx playwright install --with-deps chromium
      - name: Run browser contract
        run: npm run test:browser
      - name: Upload Playwright diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            output/playwright/report/
            output/playwright/test-results/
          if-no-files-found: ignore
          retention-days: 7

  visual-regression:
    name: Pinned Chromium visual regression
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    container:
      image: "mcr.microsoft.com/playwright:v1.61.1-noble-amd64@sha256:cf0daee9b994042e011bc29f20cdff1a9f682a039b43fcd738f7d8a9d3bcd9d6"
      options: --ipc=host --init
    env:
      CI: "true"
      ANTHILL_UPDATE_VISUALS: "0"
      ANTHILL_VISUAL_IMAGE: "mcr.microsoft.com/playwright:v1.61.1-noble-amd64@sha256:cf0daee9b994042e011bc29f20cdff1a9f682a039b43fcd738f7d8a9d3bcd9d6"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.13"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install runtime dependencies
        run: python -m pip install -r requirements-visual.txt
      - name: Install exact frontend test dependencies
        run: npm ci
      - name: Verify reviewed visual baselines exist
        run: |
          test -s tests/visual/goldens/chromium-noble/overview.png
          test -s tests/visual/goldens/chromium-noble/evidence.png
          test -s tests/visual/goldens/chromium-noble/coverage.png
          test -s tests/visual/goldens/chromium-noble/compare.png
      - name: Compare reviewed visual baselines
        run: npm run test:visual
      - name: Upload visual-regression diagnostics
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-diagnostics
          path: |
            output/playwright/visual-report/
            output/playwright/visual-results/
          if-no-files-found: warn
          retention-days: 14

  container:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Validate Compose model
        run: docker compose config --quiet
      - name: Build hardened image
        run: docker build --tag agent-anthill:ci .
      - name: Start non-root read-only container
        run: >-
          docker run --detach --name agent-anthill-ci
          --publish 127.0.0.1:8765:8765
          --read-only --tmpfs /tmp:rw,noexec,nosuid,nodev,size=64m
          --cap-drop ALL --security-opt no-new-privileges
          --pids-limit 256
          --mount type=volume,source=agent-anthill-ci-data,target=/app/.anthill-data
          agent-anthill:ci
      - name: Smoke health, identity, and writable ledger volume
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8765/api/anthill/schema >/dev/null; then
              break
            fi
            if [ "$attempt" = 30 ]; then
              docker logs agent-anthill-ci
              exit 1
            fi
            sleep 1
          done
          docker exec agent-anthill-ci python -c "import os; assert os.getuid() == 10001"
          curl --fail --silent --request POST http://127.0.0.1:8765/api/anthill/demo >/dev/null
          curl --fail --silent http://127.0.0.1:8765/api/anthill/runs | grep 'demo_'
      - name: Cleanup container
        if: always()
        run: |
          docker rm --force agent-anthill-ci || true
          docker volume rm agent-anthill-ci-data || true

  protected-main-gate:
    name: Protected main validation gate
    if: ${{ always() }}
    needs:
      - exploration-fast
      - python
      - langgraph-compat
      - frontend
      - browser
      - visual-regression
      - container
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Keep draft pull requests outside the protected-main gate
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft }}
        run: |
          echo "::error::Mark this pull request ready for review to run protected-main validation."
          exit 1
      - name: Require every validation dependency to succeed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: jq -e 'length == 7 and all(.[]; .result == "success")' <<< "$NEEDS_JSON"
