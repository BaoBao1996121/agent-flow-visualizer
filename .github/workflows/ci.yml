name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check --no-cache .
      - run: python -m pytest -q

  langgraph-compat:
    name: LangGraph StreamPart v2 (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "1.1.0 floor"
            requirement: "langgraph==1.1.0"
          - label: "supported 1.x"
            requirement: "langgraph>=1.2,<2"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install core tests and optional LangGraph runtime
        run: python -m pip install -r requirements-dev.txt "${{ matrix.requirement }}"
      - name: Show resolved LangGraph version
        run: python -c "from importlib.metadata import version; print(version('langgraph'))"
      - name: Exercise real StreamPart v2 boundary and canonical mapper
        run: >-
          python -m pytest -q
          tests/test_langgraph_runtime_compat.py
          tests/test_langgraph_adapter.py

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: node --check static/js/anthill.js
      - run: node --check static/js/app.js
      - run: node --check static/js/graph.js
      - run: node --check static/js/simulation.js

  browser:
    name: Chromium observatory contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Install frontend test dependencies
        run: npm ci
      - name: Install Chromium and Linux dependencies
        run: npx playwright install --with-deps chromium
      - name: Run browser contract
        run: npm run test:browser
      - name: Upload Playwright diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            output/playwright/report/
            output/playwright/test-results/
          if-no-files-found: ignore
          retention-days: 7

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Validate Compose model
        run: docker compose config --quiet
      - name: Build hardened image
        run: docker build --tag agent-anthill:ci .
      - name: Start non-root read-only container
        run: >-
          docker run --detach --name agent-anthill-ci
          --publish 127.0.0.1:8765:8765
          --read-only --tmpfs /tmp:rw,noexec,nosuid,nodev,size=64m
          --cap-drop ALL --security-opt no-new-privileges
          --pids-limit 256
          --mount type=volume,source=agent-anthill-ci-data,target=/app/.anthill-data
          agent-anthill:ci
      - name: Smoke health, identity, and writable ledger volume
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8765/api/anthill/schema >/dev/null; then
              break
            fi
            if [ "$attempt" = 30 ]; then
              docker logs agent-anthill-ci
              exit 1
            fi
            sleep 1
          done
          docker exec agent-anthill-ci python -c "import os; assert os.getuid() == 10001"
          curl --fail --silent --request POST http://127.0.0.1:8765/api/anthill/demo >/dev/null
          curl --fail --silent http://127.0.0.1:8765/api/anthill/runs | grep 'demo_'
      - name: Cleanup container
        if: always()
        run: |
          docker rm --force agent-anthill-ci || true
          docker volume rm agent-anthill-ci-data || true
